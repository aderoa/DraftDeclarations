<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 NBA Draft Declarations</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f9fa;
  --surface: #ffffff;
  --border: #e2e5e9;
  --text: #1a1a2e;
  --text2: #5a6070;
  --accent: #3b82f6;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:2rem 1rem; }
.container { max-width:820px; margin:0 auto; }
h1 { font-size:1.4rem; font-weight:800; text-align:center; margin-bottom:.25rem; }
.subtitle { text-align:center; font-size:.8rem; color:var(--text2); margin-bottom:1rem; }
.toolbar { display:flex; gap:.5rem; justify-content:center; margin-bottom:1.25rem; flex-wrap:wrap; }
.btn { padding:.45rem 1rem; border:1px solid var(--border); border-radius:6px; background:var(--surface); color:var(--text); font-family:'DM Sans',sans-serif; font-size:.75rem; font-weight:600; cursor:pointer; transition:all .15s; }
.btn:hover { border-color:var(--accent); color:var(--accent); }
.btn.success { background:#16a34a; color:#fff; border-color:#16a34a; }
.btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); }
.btn-primary:hover { background:#2563eb; }
.count { text-align:center; font-size:.75rem; color:var(--text2); margin-bottom:1rem; }
.loading { text-align:center; padding:3rem; color:var(--text2); }
.loading-spinner { width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto .75rem; }
@keyframes spin { to { transform:rotate(360deg); } }
.error { text-align:center; color:#dc2626; padding:2rem; font-size:.85rem; }
.preview-tbl { width:100%; border-collapse:collapse; font-size:.8rem; background:var(--surface); border-radius:8px; overflow:hidden; border:1px solid var(--border); }
.preview-tbl th { background:var(--bg); font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.3px; color:var(--text2); padding:.5rem; text-align:center; border-bottom:1px solid var(--border); }
.preview-tbl td { padding:.4rem .5rem; text-align:center; border-bottom:1px solid #f0f1f3; vertical-align:middle; }
.preview-tbl tr:hover td { background:rgba(59,130,246,.03); }
.preview-tbl td:nth-child(3) { text-align:left; font-weight:700; }
.preview-tbl .proj { font-weight:800; color:var(--accent); min-width:36px; }
.preview-tbl .proj-nd { color:var(--text2); font-weight:600; font-size:.7rem; }
.preview-tbl .flag-img { width:20px; height:14px; border-radius:2px; vertical-align:middle; object-fit:cover; }
.preview-tbl .sep-row td { background:#f3f4f6; padding:.25rem; font-size:.65rem; font-weight:700; color:var(--text2); text-align:center; border-bottom:1px solid var(--border); }
footer { text-align:center; margin-top:1.5rem; font-size:.7rem; color:var(--text2); }
footer a { color:var(--accent); text-decoration:none; }
</style>
</head>
<body>
<div class="container">
  <h1>2026 NBA Draft Declarations</h1>
  <div class="subtitle">Players who have officially declared for the 2026 NBA Draft</div>
  <div class="toolbar">
    <button class="btn btn-primary" onclick="copyPrestoHTML(this)">📋 Copy Presto HTML</button>
    <button class="btn" onclick="loadData()">🔄 Refresh</button>
  </div>
  <div class="count" id="count"></div>
  <div id="content"><div class="loading"><div class="loading-spinner"></div>Loading draft data...</div></div>
  <footer>Data compiled by <a href="https://hoopsmatic.com" target="_blank">HoopsMatic</a></footer>
</div>

<script>
const SHEET_ID = '11llk0icQqoi0JwJXat5KO8y2RQeBMN5rS9FhAY56Idc';
const API_KEY = 'AIzaSyB9g7c6llswswuZQ2I5y2MwGk6BzYEtHsY';
const SHEET_NAME = 'Sheet4';

let allDeclared = [];
let prestoCode = '';

function lastName(name) {
  const parts = (name || '').trim().split(/\s+/);
  return parts.length > 1 ? parts[parts.length - 1] : name;
}

async function loadData() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Loading draft data...</div>';

  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(SHEET_NAME)}?key=${API_KEY}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Sheets API error: ' + res.status);
    const data = await res.json();
    const rows = data.values || [];
    if (rows.length < 2) throw new Error('No data found');

    const headers = rows[0].map(h => (h || '').trim().toUpperCase());
    const col = name => {
      let i = headers.findIndex(h => h === name);
      if (i >= 0) return i;
      i = headers.findIndex(h => h.includes(name));
      return i;
    };

    const projIdx = col('PROJ') >= 0 ? col('PROJ') : col('PICK') >= 0 ? col('PICK') : col('PROJECTED');
    const flagIdx = col('FLAG');
    const playerIdx = col('PLAYER') >= 0 ? col('PLAYER') : col('NAME');
    const posIdx = col('POS') >= 0 ? col('POS') : col('POSITION');
    const teamIdx = col('SCHOOL') >= 0 ? col('SCHOOL') : col('TEAM') >= 0 ? col('TEAM') : col('COLLEGE');
    const ageIdx = col('AGE');
    const declIdx = col('ENTERED DRAFT') >= 0 ? col('ENTERED DRAFT') : col('DECLARED') >= 0 ? col('DECLARED') : col('ENTERED');

    if (playerIdx < 0) throw new Error('Cannot find PLAYER column. Headers: ' + headers.join(', '));
    if (declIdx < 0) throw new Error('Cannot find ENTERED DRAFT column. Headers: ' + headers.join(', '));

    console.log('Columns:', { projIdx, flagIdx, playerIdx, posIdx, teamIdx, ageIdx, declIdx });

    allDeclared = [];
    for (let i = 1; i < rows.length; i++) {
      const r = rows[i];
      const entered = ((r[declIdx] || '').trim().toUpperCase());
      if (entered !== 'YES') continue;
      const player = (r[playerIdx] || '').trim();
      if (!player) continue;

      allDeclared.push({
        proj: projIdx >= 0 ? (r[projIdx] || '').trim() : '',
        flag: flagIdx >= 0 ? (r[flagIdx] || '').trim() : '',
        player,
        pos: posIdx >= 0 ? (r[posIdx] || '').trim() : '',
        team: teamIdx >= 0 ? (r[teamIdx] || '').trim() : '',
        age: ageIdx >= 0 ? (r[ageIdx] || '').trim() : '',
      });
    }

    // Sort: numbered picks ascending, then NR/blank by last name
    allDeclared.sort((a, b) => {
      const aNum = parseInt(a.proj);
      const bNum = parseInt(b.proj);
      const aIsNum = !isNaN(aNum);
      const bIsNum = !isNaN(bNum);
      if (aIsNum && bIsNum) return aNum - bNum;
      if (aIsNum && !bIsNum) return -1;
      if (!aIsNum && bIsNum) return 1;
      return lastName(a.player).localeCompare(lastName(b.player));
    });

    // Assign ranking to NR players (61, 62, etc.)
    let nrRank = 61;
    // Find the highest drafted pick number to start NR from
    const maxDrafted = allDeclared.reduce((max, p) => {
      const n = parseInt(p.proj);
      return !isNaN(n) && n > max ? n : max;
    }, 60);
    nrRank = maxDrafted + 1;
    allDeclared.forEach(p => {
      if (isNaN(parseInt(p.proj))) {
        p.nrRank = nrRank++;
      }
    });

    document.getElementById('count').textContent = allDeclared.length + ' players declared';
    renderPreview();
    buildPrestoHTML();

  } catch (e) {
    content.innerHTML = `<div class="error">Error: ${e.message}</div>`;
    console.error(e);
  }
}

function flagHTML(code) {
  if (!code) return '';
  if (code.length === 2) return `<img src="https://flagcdn.com/w40/${code.toLowerCase()}.png" class="flag-img" alt="${code}" onerror="this.style.display='none'">`;
  if (code.startsWith('http')) return `<img src="${code}" class="flag-img" alt="" onerror="this.style.display='none'">`;
  return code;
}

function flagPrestoHTML(code) {
  if (!code) return '';
  if (code.length === 2) return `<img src="https://flagcdn.com/w40/${code.toLowerCase()}.png" style="width:20px;height:14px;border-radius:2px;vertical-align:middle;object-fit:cover" alt="${code}">`;
  if (code.startsWith('http')) return `<img src="${code}" style="width:20px;height:14px;border-radius:2px;vertical-align:middle;object-fit:cover" alt="">`;
  return code;
}

function renderPreview() {
  let html = '<table class="preview-tbl"><thead><tr>';
  html += '<th>Proj</th><th></th><th style="text-align:left">Player</th><th>Pos</th><th>Team</th><th>Age</th>';
  html += '</tr></thead><tbody>';

  let addedSep = false;
  allDeclared.forEach(p => {
    const isNR = isNaN(parseInt(p.proj));
    if (isNR && !addedSep) {
      addedSep = true;
      html += '<tr class="sep-row"><td colspan="6">NOT RANKED</td></tr>';
    }
    html += '<tr>';
    html += `<td class="${isNR ? 'proj-nd' : 'proj'}">${isNR ? p.nrRank : p.proj}</td>`;
    html += `<td>${flagHTML(p.flag)}</td>`;
    html += `<td style="text-align:left;font-weight:700">${p.player}</td>`;
    html += `<td>${p.pos}</td>`;
    html += `<td>${p.team}</td>`;
    html += `<td>${p.age}</td>`;
    html += '</tr>';
  });

  html += '</tbody></table>';
  html += '<p style="font-size:.65rem;color:var(--text2);margin-top:.5rem;text-align:center;">* Projected rank based on our Aggregated Mock Draft (NR = Not Ranked)</p>';
  document.getElementById('content').innerHTML = html;
}

function buildPrestoHTML() {
  let h = '<style>\n';
  h += '.dd-wrap{font-family:sans-serif;max-width:800px;margin:0 auto;font-size:14px}\n';
  h += '.dd-tbl{width:100%;border-collapse:collapse;text-align:center}\n';
  h += '.dd-tbl th,.dd-tbl td{border:none;padding:5px 8px;text-align:center}\n';
  h += '.dd-tbl th{background:#f2f2f2;font-size:12px;font-weight:700}\n';
  h += '.dd-tbl td{background:#f2f2f2;font-size:13px}\n';
  h += '.dd-tbl td:nth-child(3){text-align:left;font-weight:700}\n';
  h += '.dd-tbl .proj{font-weight:800;color:#3b82f6}\n';
  h += '.dd-tbl .proj-nd{color:#888;font-weight:600;font-size:12px}\n';
  h += '.dd-tbl .sep td{background:#ddd;font-weight:700;font-size:11px;padding:4px}\n';
  h += '.dd-tbl .flag{width:20px;height:14px;border-radius:2px;vertical-align:middle;object-fit:cover}\n';
  h += '</style>\n\n';
  h += '<div class="dd-wrap">\n';
  h += '<table class="dd-tbl">\n';
  h += '<tr><th>PROJ</th><th></th><th style="text-align:left">PLAYER</th><th>POS</th><th>TEAM</th><th>AGE</th></tr>\n';

  let addedSep = false;
  allDeclared.forEach(p => {
    const isNR = isNaN(parseInt(p.proj));
    if (isNR && !addedSep) {
      addedSep = true;
      h += '<tr class="sep"><td colspan="6">NOT RANKED</td></tr>\n';
    }
    h += '<tr>';
    h += `<td class="${isNR ? 'proj-nd' : 'proj'}">${isNR ? p.nrRank : p.proj}</td>`;
    h += `<td>${flagPrestoHTML(p.flag)}</td>`;
    h += `<td style="text-align:left;font-weight:700">${p.player}</td>`;
    h += `<td>${p.pos}</td>`;
    h += `<td>${p.team}</td>`;
    h += `<td>${p.age}</td>`;
    h += '</tr>\n';
  });

  h += '</table>\n';
  h += '<p style="font-size:11px;color:#888;margin-top:6px;text-align:center;">* Projected rank based on our Aggregated Mock Draft (NR = Not Ranked)</p>\n';
  h += '</div>';
  prestoCode = h;
}

function copyPrestoHTML(btn) {
  if (!prestoCode) { alert('No data loaded yet'); return; }
  const orig = btn.textContent;
  const blob = new Blob([prestoCode], { type: 'text/plain' });
  navigator.clipboard.write([new ClipboardItem({ 'text/plain': blob })]).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('success');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('success'); }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = prestoCode;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

loadData();
</script>
</body>
</html>
